<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nala and Me</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #2a2a3d 0%, #111 55%, #000 100%);
      color: #f8e7a3;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      padding: 2rem 2.5rem;
      border: 1px solid rgba(248, 231, 163, 0.2);
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      text-align: center;
      max-width: 680px;
    }
    h1 { margin: 0 0 0.75rem; font-size: clamp(2rem, 5vw, 4rem); }
    p { margin: 0.4rem 0; font-size: 1.05rem; line-height: 1.55; }
    .tiny { opacity: 0.8; font-size: 0.95rem; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Nala and Me ✨</h1>
    <p>GitHub write test successful.</p>
    <p>This repo is now ready to be used as the home for our game.</p>
    <p class="tiny">Next step: turn this into a playable voxel prototype.</p>
  </main>
</body>
</html>
