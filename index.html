<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nala and Me — Tron UI</title>
  <style>
    :root {
      --cyan: #77f6ff;
      --cyan-2: #11d6ff;
      --amber: #ffd98a;
      --bg: #04070d;
      --glass: rgba(6, 12, 20, 0.68);
      --line: rgba(119, 246, 255, 0.24);
    }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Inter, system-ui, sans-serif;
    }
    canvas { display: block; }
    #overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 10%, rgba(17, 214, 255, 0.14), transparent 32%),
        radial-gradient(circle at 50% 120%, rgba(255, 217, 138, 0.08), transparent 40%),
        linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.86));
      color: white;
      text-align: center;
      cursor: pointer;
      z-index: 2;
    }
    .card {
      position: relative;
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 30px 32px;
      width: min(760px, calc(100vw - 32px));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 0 30px rgba(17, 214, 255, 0.12),
        0 24px 90px rgba(0,0,0,0.46);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(119,246,255,0.08), transparent),
        repeating-linear-gradient(180deg, transparent 0 22px, rgba(119,246,255,0.03) 22px 23px);
      pointer-events: none;
    }
    .eyebrow {
      margin: 0 0 10px;
      color: var(--cyan);
      font-size: 0.82rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      opacity: 0.88;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.2rem, 6vw, 4.4rem);
      line-height: 0.93;
      color: var(--amber);
      letter-spacing: -0.055em;
      text-shadow: 0 0 18px rgba(255, 217, 138, 0.25);
    }
    p {
      margin: 8px 0;
      color: rgba(255,255,255,0.9);
      line-height: 1.45;
    }
    .tiny {
      color: rgba(255,255,255,0.6);
      font-size: 0.94rem;
      margin-top: 12px;
    }
    .pillrow {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 18px;
    }
    .pill {
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(119,246,255,0.16);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.86);
      font-size: 0.9rem;
      box-shadow: 0 0 16px rgba(17,214,255,0.06) inset;
    }
    #debug {
      position: absolute;
      left: 14px;
      bottom: 12px;
      color: rgba(255,255,255,0.88);
      font-size: 0.82rem;
      z-index: 3;
      text-shadow: 0 0 12px rgba(17, 214, 255, 0.45);
      pointer-events: none;
      letter-spacing: 0.04em;
    }
    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      margin-left: -9px;
      margin-top: -9px;
      z-index: 3;
      pointer-events: none;
      filter: drop-shadow(0 0 8px rgba(17,214,255,0.7));
    }
    #crosshair::before, #crosshair::after {
      content: "";
      position: absolute;
      background: var(--cyan);
    }
    #crosshair::before { left: 8px; top: 0; width: 2px; height: 18px; }
    #crosshair::after { left: 0; top: 8px; width: 18px; height: 2px; }
    #frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      box-shadow: inset 0 0 120px rgba(17, 214, 255, 0.12);
    }
    #frame::before, #frame::after {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(119,246,255,0.07);
      border-radius: 18px;
    }
    #frame::after {
      inset: 22px;
      border-color: rgba(255,217,138,0.04);
      border-radius: 14px;
    }
  </style>
</head>
<body>
<div id="frame"></div>
<div id="overlay">
  <div class="card">
    <div class="eyebrow">ARES // PROTOTYPE LAYER</div>
    <h1>Nala and Me ✨</h1>
    <p>Tron-style UI pass for the movement sandbox.</p>
    <p>Click to drop in. Walk the grid. Feel the loop.</p>
    <div class="pillrow">
      <div class="pill">WASD Move</div>
      <div class="pill">Mouse Look</div>
      <div class="pill">Space Jump</div>
      <div class="pill">Shift Sprint</div>
    </div>
    <p class="tiny">If you can see this glow, Vercel updates are behaving exactly how we want.</p>
  </div>
</div>
<div id="crosshair"></div>
<div id="debug">loading…</div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8bb8ff);
scene.fog = new THREE.Fog(0x8bb8ff, 32, 100);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const overlay = document.getElementById('overlay');
const debug = document.getElementById('debug');

const hemi = new THREE.HemisphereLight(0xdce8ff, 0x435238, 1.7);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff6d6, 1.3);
sun.position.set(20, 35, 12);
scene.add(sun);

const boxGeo = new THREE.BoxGeometry(1, 1, 1);
const materialTop = new THREE.MeshStandardMaterial({ color: 0x6cbc4e, roughness: 0.95 });
const materialDirt = new THREE.MeshStandardMaterial({ color: 0x7b5334, roughness: 1.0 });
const materialStone = new THREE.MeshStandardMaterial({ color: 0x8f939a, roughness: 0.95 });

const CHUNK_SIZE = 16;
const CHUNK_RADIUS = 2;
const chunks = new Map();
const tempMatrix = new THREE.Matrix4();
const worldUp = new THREE.Vector3(0, 1, 0);

function hash2(x, z) {
  const s = Math.sin(x * 127.1 + z * 311.7) * 43758.5453123;
  return s - Math.floor(s);
}

function smoothstep(t) {
  return t * t * (3 - 2 * t);
}

function valueNoise(x, z) {
  const x0 = Math.floor(x);
  const z0 = Math.floor(z);
  const x1 = x0 + 1;
  const z1 = z0 + 1;
  const tx = smoothstep(x - x0);
  const tz = smoothstep(z - z0);
  const a = hash2(x0, z0);
  const b = hash2(x1, z0);
  const c = hash2(x0, z1);
  const d = hash2(x1, z1);
  const ab = a + (b - a) * tx;
  const cd = c + (d - c) * tx;
  return ab + (cd - ab) * tz;
}

function fbm(x, z) {
  let value = 0;
  let amplitude = 0.5;
  let frequency = 1;
  for (let i = 0; i < 4; i++) {
    value += valueNoise(x * frequency, z * frequency) * amplitude;
    frequency *= 2;
    amplitude *= 0.5;
  }
  return value;
}

function heightAt(x, z) {
  const broad = fbm(x * 0.04, z * 0.04) * 10;
  const hills = fbm((x + 100) * 0.09, (z - 50) * 0.09) * 5;
  const detail = fbm((x - 200) * 0.22, (z + 140) * 0.22) * 1.8;
  return Math.max(1, Math.floor(1 + broad + hills + detail));
}

function keyForChunk(cx, cz) {
  return `${cx},${cz}`;
}

function buildChunk(cx, cz) {
  const group = new THREE.Group();
  const topPositions = [];
  const dirtPositions = [];
  const stonePositions = [];

  for (let lx = 0; lx < CHUNK_SIZE; lx++) {
    for (let lz = 0; lz < CHUNK_SIZE; lz++) {
      const wx = cx * CHUNK_SIZE + lx;
      const wz = cz * CHUNK_SIZE + lz;
      const h = heightAt(wx, wz);
      for (let y = 0; y < h; y++) {
        const isTop = y === h - 1;
        const isDirt = y >= h - 3;
        const pos = [wx, y, wz];
        if (isTop) topPositions.push(pos);
        else if (isDirt) dirtPositions.push(pos);
        else stonePositions.push(pos);
      }
    }
  }

  function makeInstanced(material, positions) {
    const mesh = new THREE.InstancedMesh(boxGeo, material, positions.length);
    let i = 0;
    for (const [x, y, z] of positions) {
      tempMatrix.makeTranslation(x, y, z);
      mesh.setMatrixAt(i++, tempMatrix);
    }
    mesh.instanceMatrix.needsUpdate = true;
    group.add(mesh);
  }

  makeInstanced(materialTop, topPositions);
  makeInstanced(materialDirt, dirtPositions);
  makeInstanced(materialStone, stonePositions);
  scene.add(group);
  chunks.set(keyForChunk(cx, cz), group);
}

function unloadFarChunks(centerCx, centerCz) {
  for (const [key, group] of chunks) {
    const [cx, cz] = key.split(',').map(Number);
    if (Math.abs(cx - centerCx) > CHUNK_RADIUS || Math.abs(cz - centerCz) > CHUNK_RADIUS) {
      scene.remove(group);
      chunks.delete(key);
    }
  }
}

function ensureChunksAround(x, z) {
  const centerCx = Math.floor(x / CHUNK_SIZE);
  const centerCz = Math.floor(z / CHUNK_SIZE);
  for (let dz = -CHUNK_RADIUS; dz <= CHUNK_RADIUS; dz++) {
    for (let dx = -CHUNK_RADIUS; dx <= CHUNK_RADIUS; dx++) {
      const cx = centerCx + dx;
      const cz = centerCz + dz;
      const key = keyForChunk(cx, cz);
      if (!chunks.has(key)) buildChunk(cx, cz);
    }
  }
  unloadFarChunks(centerCx, centerCz);
}

const player = {
  pos: new THREE.Vector3(0, 10, 0),
  vel: new THREE.Vector3(),
  yaw: 0,
  pitch: -0.22,
  height: 1.7,
  onGround: false,
};

function groundHeight(x, z) {
  return heightAt(Math.round(x), Math.round(z)) + player.height;
}

player.pos.set(0, groundHeight(0, 0) + 2, 0);
ensureChunksAround(player.pos.x, player.pos.z);

const keys = new Set();
document.addEventListener('keydown', (e) => keys.add(e.code));
document.addEventListener('keyup', (e) => keys.delete(e.code));

document.addEventListener('mousemove', (e) => {
  if (document.pointerLockElement !== renderer.domElement) return;
  player.yaw -= e.movementX * 0.0022;
  player.pitch -= e.movementY * 0.0022;
  player.pitch = Math.max(-1.5, Math.min(1.5, player.pitch));
});

overlay.addEventListener('click', () => renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange', () => {
  overlay.style.display = document.pointerLockElement === renderer.domElement ? 'none' : 'grid';
});

const clock = new THREE.Clock();
let lastChunkX = Infinity;
let lastChunkZ = Infinity;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.033);

  const sprint = keys.has('ShiftLeft') || keys.has('ShiftRight');
  const moveSpeed = sprint ? 8.8 : 5.8;
  const accel = player.onGround ? 34 : 14;
  const drag = player.onGround ? 14 : 3;

  camera.rotation.order = 'YXZ';
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  if (forward.lengthSq() > 0) forward.normalize();

  const right = new THREE.Vector3();
  right.crossVectors(forward, worldUp).normalize();

  const input = new THREE.Vector3();
  if (keys.has('KeyW')) input.add(forward);
  if (keys.has('KeyS')) input.sub(forward);
  if (keys.has('KeyD')) input.add(right);
  if (keys.has('KeyA')) input.sub(right);
  if (input.lengthSq() > 0) input.normalize();

  player.vel.x += input.x * accel * dt;
  player.vel.z += input.z * accel * dt;

  const horiz = new THREE.Vector2(player.vel.x, player.vel.z);
  if (horiz.length() > moveSpeed) {
    horiz.setLength(moveSpeed);
    player.vel.x = horiz.x;
    player.vel.z = horiz.y;
  }

  player.vel.x -= player.vel.x * Math.min(1, drag * dt);
  player.vel.z -= player.vel.z * Math.min(1, drag * dt);
  player.vel.y -= 20 * dt;

  if (keys.has('Space') && player.onGround) {
    player.vel.y = 7.4;
    player.onGround = false;
  }

  player.pos.addScaledVector(player.vel, dt);
  const floor = groundHeight(player.pos.x, player.pos.z);
  if (player.pos.y <= floor) {
    player.pos.y = floor;
    player.vel.y = 0;
    player.onGround = true;
  } else {
    player.onGround = false;
  }

  const currentChunkX = Math.floor(player.pos.x / CHUNK_SIZE);
  const currentChunkZ = Math.floor(player.pos.z / CHUNK_SIZE);
  if (currentChunkX !== lastChunkX || currentChunkZ !== lastChunkZ) {
    lastChunkX = currentChunkX;
    lastChunkZ = currentChunkZ;
    ensureChunksAround(player.pos.x, player.pos.z);
  }

  camera.position.copy(player.pos);

  debug.textContent = `x ${player.pos.x.toFixed(1)}  y ${player.pos.y.toFixed(1)}  z ${player.pos.z.toFixed(1)}  chunks ${chunks.size}`;
  renderer.render(scene, camera);
}

animate();
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
