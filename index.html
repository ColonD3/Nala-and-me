<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nala and Me — Alpha</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:sans-serif;}
canvas{display:block;}
#overlay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,0.7);color:white;cursor:pointer;}
#hotbar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;}
.slot{width:50px;height:50px;border:2px solid white;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);}
.selected{border-color:yellow;}
</style>
</head>
<body>

<div id="overlay">Click to Start</div>
<div id="hotbar"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js';

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87b6ff);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const light=new THREE.DirectionalLight(0xffffff,1.2);
light.position.set(5,10,5);
scene.add(light);

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2(0,0);

const blockTypes=["grass","dirt","stone"];
let selectedBlock=0;

const hotbar=document.getElementById("hotbar");
blockTypes.forEach((b,i)=>{
  const div=document.createElement("div");
  div.className="slot";
  div.innerText=i+1;
  hotbar.appendChild(div);
});

function updateHotbar(){
  [...hotbar.children].forEach((c,i)=>{
    c.classList.toggle("selected",i===selectedBlock);
  });
}
updateHotbar();

const blocks=new Map();
const meshes=new Map();

function key(x,y,z){return x+","+y+","+z;}

function createBlock(x,y,z,type){
  const geo=new THREE.BoxGeometry(1,1,1);
  const colors={
    grass:0x66aa55,
    dirt:0x7a5232,
    stone:0x888888
  };
  const mat=new THREE.MeshStandardMaterial({color:colors[type]});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(x,y,z);
  scene.add(mesh);

  blocks.set(key(x,y,z),type);
  meshes.set(key(x,y,z),mesh);
}

function removeBlock(x,y,z){
  const k=key(x,y,z);
  if(meshes.has(k)){
    scene.remove(meshes.get(k));
    meshes.delete(k);
    blocks.delete(k);
  }
}

// generate world
for(let x=-10;x<10;x++){
  for(let z=-10;z<10;z++){
    const h=Math.floor(2+Math.sin(x*0.3)+Math.cos(z*0.3));
    for(let y=0;y<h;y++){
      const type=y===h-1?"grass":(y>h-3?"dirt":"stone");
      createBlock(x,y,z,type);
    }
  }
}

camera.position.set(0,3,5);

let yaw=0,pitch=0;
const keys=new Set();

document.addEventListener("keydown",e=>{
  keys.add(e.code);
  if(e.code.startsWith("Digit")){
    selectedBlock=parseInt(e.code.replace("Digit",""))-1;
    if(selectedBlock>=0&&selectedBlock<blockTypes.length)updateHotbar();
  }
});
document.addEventListener("keyup",e=>keys.delete(e.code));

document.addEventListener("mousemove",e=>{
  if(document.pointerLockElement){
    yaw-=e.movementX*0.002;
    pitch-=e.movementY*0.002;
    pitch=Math.max(-1.5,Math.min(1.5,pitch));
  }
});

document.body.addEventListener("mousedown",e=>{
  if(!document.pointerLockElement)return;

  raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
  const intersects=raycaster.intersectObjects([...meshes.values()]);

  if(intersects.length){
    const hit=intersects[0];
    const pos=hit.object.position;

    if(e.button===0){
      removeBlock(pos.x,pos.y,pos.z);
    }
    if(e.button===2){
      const n=hit.face.normal;
      createBlock(pos.x+n.x,pos.y+n.y,pos.z+n.z,blockTypes[selectedBlock]);
    }
  }
});

document.addEventListener("contextmenu",e=>e.preventDefault());

document.getElementById("overlay").onclick=()=>{
  renderer.domElement.requestPointerLock();
  document.getElementById("overlay").style.display="none";
};

function animate(){
  requestAnimationFrame(animate);

  const forward=new THREE.Vector3(Math.sin(yaw),0,-Math.cos(yaw));
  const right=new THREE.Vector3(Math.cos(yaw),0,Math.sin(yaw));

  if(keys.has("KeyW"))camera.position.addScaledVector(forward,0.1);
  if(keys.has("KeyS"))camera.position.addScaledVector(forward,-0.1);
  if(keys.has("KeyD"))camera.position.addScaledVector(right,0.1);
  if(keys.has("KeyA"))camera.position.addScaledVector(right,-0.1);

  camera.rotation.order="YXZ";
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;

  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
